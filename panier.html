<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panier - Ma Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Ma Boutique</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMenu"> 
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">ACCUEIL</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="contact.html">CONTACT</a>
          </li>
        </ul>
        <div class="d-flex">
          <a class="btn btn-outline-light me-2" href="panier.html">Panier (<span id="cart-count">0</span>)</a>
          <a class="btn btn-primary" href="connexion.html">CONNEXION</a>
        </div>
      </div>
    </div>
  </nav>

  <section class="py-5">
    <div class="container">
      <h2 class="text-center mb-4">Votre Panier</h2>
      <div id="cart-items">
        <!-- Cart items will be displayed here -->
      </div>
      <div class="text-center mt-4">
        <button class="btn btn-success" onclick="checkout()">Commander</button>
      </div>
    </div>
  </section>

  <footer class="bg-dark text-white text-center py-3">
    <div class="container">
      <p>&copy; 2023 Ma Boutique. Tous droits réservés.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    function displayCart() {
      const cartItems = document.getElementById('cart-items');
      if (cart.length === 0) {
        cartItems.innerHTML = '<p>Votre panier est vide.</p>';
      } else {
        let html = '<ul class="list-group">';
        let total = 0;
        cart.forEach(item => {
          html += `<li class="list-group-item d-flex justify-content-between align-items-center">
            ${item.name}
            <span class="badge bg-primary rounded-pill">${item.price} €</span>
          </li>`;
          total += item.price;
        });
        html += '</ul>';
        html += `<div class="mt-3"><strong>Total: ${total.toFixed(2)} €</strong></div>`;
        cartItems.innerHTML = html;
      }
    }

    function checkout() {
      alert('Fonctionnalité de commande à implémenter.');
    }

    document.addEventListener('DOMContentLoaded', function() {
      displayCart();
      updateCartDisplay();
    });
  </script>
</body>
</html>
